<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Pool Entries</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      background-color: #f5f5f0;
      color: #2e4e1c;
    }
    h1 {
      text-align: center;
      color: #1e3d14;
      margin-bottom: 8px;
    }
    .note {
      font-size: 14px;
      color: #555;
      text-align: center;
      margin-bottom: 10px;
    }
    .count {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
      color: #1e3d14;
      font-size: 16px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .entry {
      max-width: 600px;
      margin: 0 auto 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px 16px;
      background-color: #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Masters Pool Entries</h1>
  <p class="note">Entries received so far. Picks will be revealed after the tournament starts.</p>
  <div class="count" id="entryCount">Loading...</div>

  <input type="text" id="search" placeholder="Search by entry name..." oninput="renderEntries()">

  <div id="entries">Loading...</div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZRYVfTCyD1V-ZkpAJALuN7fUNWz-GRTCY4p-Ci1U84O3ahn0if36VecchzN3k6Xjt1IYXHF6aKNYJ/pub?gid=1221913713&single=true&output=csv";

    let allEntries = [];

    fetch(SHEET_URL)
      .then(res => res.text())
      .then(text => {
        const rows = text.split('\n').slice(1);

        allEntries = rows
          .map(row => row.split(','))
          .filter(r => r[0])
          .map(r => ({
            name: (r[0] || '').replaceAll('""', '"').replace(/^"|"$/g, '').trim()
          }))
          .filter(e => e.name);

        allEntries.sort((a, b) => a.name.localeCompare(b.name));

        renderEntries();
      })
      .catch(() => {
        document.getElementById("entries").innerText = "Error loading entries.";
        document.getElementById("entryCount").innerText = "";
      });

    function renderEntries() {
      const search = document.getElementById("search").value.toLowerCase();

      const filtered = allEntries.filter(e =>
        e.name.toLowerCase().includes(search)
      );

      document.getElementById("entryCount").innerText =
        `${allEntries.length} total entries`;

      const html = filtered.map(entry => `
        <div class="entry">${entry.name}</div>
      `).join('');

      document.getElementById("entries").innerHTML =
        html || "No entries found.";
    }
  </script>
</body>
</html>
